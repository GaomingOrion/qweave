<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>qfactors evaluation report</title>
<style>
:root {
  --bg: #ffffff; --fg: #1a1d21; --muted: #6b7280; --line: #e5e7eb;
  --pos: #2563eb; --neg: #dc2626; --accent: #2563eb; --row: #f8fafc;
}
@media (prefers-color-scheme: dark) {
  :root { --bg: #0f1216; --fg: #e6e8eb; --muted: #9aa4b2; --line: #262b31;
          --pos: #60a5fa; --neg: #f87171; --accent: #60a5fa; --row: #161b21; }
}
* { box-sizing: border-box; }
body { margin: 0; font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
       color: var(--fg); background: var(--bg); }
header { padding: 20px 24px; border-bottom: 1px solid var(--line); }
h1 { margin: 0; font-size: 18px; font-weight: 650; }
.sub { color: var(--muted); font-size: 13px; margin-top: 4px; }
main { padding: 20px 24px; display: grid; gap: 24px; }
.controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
input, select { font: inherit; color: var(--fg); background: var(--bg);
                border: 1px solid var(--line); border-radius: 6px; padding: 6px 8px; }
.table-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 8px; }
table { border-collapse: collapse; width: 100%; font-variant-numeric: tabular-nums; }
th, td { padding: 7px 10px; text-align: right; white-space: nowrap; border-bottom: 1px solid var(--line); }
th { position: sticky; top: 0; background: var(--bg); cursor: pointer; user-select: none;
     font-weight: 600; font-size: 12px; color: var(--muted); }
th:first-child, td:first-child { text-align: left; }
tbody tr:nth-child(even) { background: var(--row); }
tbody tr.sel { outline: 2px solid var(--accent); outline-offset: -2px; }
tbody tr { cursor: pointer; }
.pos { color: var(--pos); } .neg { color: var(--neg); }
.panel { border: 1px solid var(--line); border-radius: 8px; padding: 16px; }
.panel h2 { margin: 0 0 4px; font-size: 15px; }
.charts { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; margin-top: 12px; }
.chart h3 { margin: 0 0 8px; font-size: 13px; color: var(--muted); font-weight: 600; }
svg { width: 100%; height: auto; display: block; }
.axis { stroke: var(--line); } .tick { fill: var(--muted); font-size: 10px; }
.hint { color: var(--muted); font-size: 12px; }
</style>
</head>
<body>
<header>
  <h1>qfactors evaluation report</h1>
  <div class="sub" id="sub"></div>
</header>
<main>
  <div class="controls">
    <input id="filter" type="text" placeholder="filter factors…" autocomplete="off">
    <select id="horizon"></select>
    <span class="hint">click a row to drill into a factor</span>
  </div>
  <div class="table-wrap">
    <table id="summary"><thead></thead><tbody></tbody></table>
  </div>
  <div class="panel" id="detail" hidden></div>
</main>
<script>
const SUMMARY = __SUMMARY__;
const DETAIL = __DETAIL__;

const NS = "http://www.w3.org/2000/svg";
const fmt = (v, d = 3) => (v === null || v === undefined || Number.isNaN(v)) ? "" : v.toFixed(d);
const cls = (v) => (v === null || Number.isNaN(v)) ? "" : (v >= 0 ? "pos" : "neg");

const horizons = [...new Set(SUMMARY.map(r => r.horizon))].sort((a, b) => a - b);
const cols = SUMMARY.length ? Object.keys(SUMMARY[0]) : [];
let sortKey = cols.includes("rank_ic_ir") ? "rank_ic_ir" : "factor";
let sortDir = -1;
let selected = null;

const hSel = document.getElementById("horizon");
horizons.forEach(h => { const o = document.createElement("option"); o.value = h; o.textContent = "horizon " + h; hSel.appendChild(o); });
document.getElementById("sub").textContent =
  `${new Set(SUMMARY.map(r => r.factor)).size} factors · ${horizons.length} horizons`;

function svg(w, h) { const s = document.createElementNS(NS, "svg"); s.setAttribute("viewBox", `0 0 ${w} ${h}`); return s; }
function el(tag, attrs, parent) { const n = document.createElementNS(NS, tag); for (const k in attrs) n.setAttribute(k, attrs[k]); if (parent) parent.appendChild(n); return n; }

function barChart(labels, series, seriesNames) {
  const W = 360, H = 200, padL = 34, padB = 26, padT = 8, padR = 8;
  const s = svg(W, H);
  const flat = series.flat().filter(v => v !== null && !Number.isNaN(v));
  if (!flat.length) return s;
  let lo = Math.min(0, ...flat), hi = Math.max(0, ...flat);
  if (lo === hi) hi = lo + 1;
  const x0 = padL, x1 = W - padR, y0 = H - padB, y1 = padT;
  const sx = i => x0 + (x1 - x0) * (i + 0.5) / labels.length;
  const sy = v => y0 + (y1 - y0) * (v - lo) / (hi - lo);
  el("line", { x1: x0, y1: sy(0), x2: x1, y2: sy(0), class: "axis" }, s);
  [lo, (lo + hi) / 2, hi].forEach(v => el("text", { x: x0 - 4, y: sy(v) + 3, "text-anchor": "end", class: "tick" }, s).textContent = v.toFixed(3));
  const groupW = (x1 - x0) / labels.length * 0.8;
  const barW = groupW / series.length;
  series.forEach((serie, si) => {
    serie.forEach((v, i) => {
      if (v === null || Number.isNaN(v)) return;
      const cx = sx(i) - groupW / 2 + barW * si;
      const top = Math.min(sy(0), sy(v)), hgt = Math.abs(sy(v) - sy(0));
      el("rect", { x: cx, y: top, width: barW * 0.9, height: hgt,
                   fill: v >= 0 ? "var(--pos)" : "var(--neg)", opacity: 0.4 + 0.6 * (si + 1) / series.length }, s);
    });
  });
  labels.forEach((lab, i) => el("text", { x: sx(i), y: H - 8, "text-anchor": "middle", class: "tick" }, s).textContent = lab);
  return s;
}

function lineChart(labels, series, colors) {
  const W = 360, H = 200, padL = 34, padB = 30, padT = 8, padR = 8;
  const s = svg(W, H);
  const flat = series.flat().filter(v => v !== null && !Number.isNaN(v));
  if (!flat.length) return s;
  let lo = Math.min(0, ...flat), hi = Math.max(0, ...flat);
  if (lo === hi) hi = lo + 1;
  const x0 = padL, x1 = W - padR, y0 = H - padB, y1 = padT;
  const n = labels.length;
  const sx = i => x0 + (x1 - x0) * (n <= 1 ? 0.5 : i / (n - 1));
  const sy = v => y0 + (y1 - y0) * (v - lo) / (hi - lo);
  el("line", { x1: x0, y1: sy(0), x2: x1, y2: sy(0), class: "axis" }, s);
  [lo, hi].forEach(v => el("text", { x: x0 - 4, y: sy(v) + 3, "text-anchor": "end", class: "tick" }, s).textContent = v.toFixed(3));
  series.forEach((serie, si) => {
    let d = "";
    serie.forEach((v, i) => { if (v === null || Number.isNaN(v)) return; d += (d ? "L" : "M") + sx(i) + " " + sy(v); });
    if (d) el("path", { d, fill: "none", stroke: colors[si], "stroke-width": 1.6 }, s);
  });
  const step = Math.max(1, Math.ceil(n / 6));
  labels.forEach((lab, i) => { if (i % step === 0) el("text", { x: sx(i), y: H - 10, "text-anchor": "middle", class: "tick" }, s).textContent = lab; });
  return s;
}

function renderTable() {
  const q = document.getElementById("filter").value.toLowerCase();
  const h = Number(hSel.value);
  const rows = SUMMARY.filter(r => r.horizon === h && r.factor.toLowerCase().includes(q))
    .sort((a, b) => {
      const av = a[sortKey], bv = b[sortKey];
      if (typeof av === "string") return sortDir * av.localeCompare(bv);
      return sortDir * ((av ?? -Infinity) - (bv ?? -Infinity));
    });
  const thead = document.querySelector("#summary thead");
  const tbody = document.querySelector("#summary tbody");
  thead.innerHTML = ""; tbody.innerHTML = "";
  const tr = document.createElement("tr");
  cols.forEach(c => {
    const th = document.createElement("th");
    th.textContent = c + (c === sortKey ? (sortDir < 0 ? " ▼" : " ▲") : "");
    th.onclick = () => { if (sortKey === c) sortDir *= -1; else { sortKey = c; sortDir = -1; } renderTable(); };
    tr.appendChild(th);
  });
  thead.appendChild(tr);
  rows.forEach(r => {
    const tr = document.createElement("tr");
    if (r.factor === selected) tr.className = "sel";
    cols.forEach(c => {
      const td = document.createElement("td");
      const v = r[c];
      if (typeof v === "number") { td.textContent = fmt(v, Number.isInteger(v) ? 0 : 3); td.className = ["ic_mean","rank_ic_mean","spread_mean","ls_net_ann","ic_t_nw","rank_ic_t_nw"].includes(c) ? cls(v) : ""; }
      else td.textContent = v ?? "";
      tr.appendChild(td);
    });
    tr.onclick = () => { selected = r.factor; renderTable(); renderDetail(r.factor); };
    tbody.appendChild(tr);
  });
}

function renderDetail(factor) {
  const panel = document.getElementById("detail");
  const d = DETAIL[factor];
  panel.hidden = false;
  panel.innerHTML = "";
  const h2 = document.createElement("h2"); h2.textContent = factor; panel.appendChild(h2);
  if (!d) { const p = document.createElement("div"); p.className = "hint"; p.textContent = "no drill-down detail inlined for this factor"; panel.appendChild(p); return; }
  const charts = document.createElement("div"); charts.className = "charts"; panel.appendChild(charts);

  const qc = document.createElement("div"); qc.className = "chart";
  qc.innerHTML = "<h3>mean return by quantile (per horizon)</h3>";
  qc.appendChild(barChart(d.bins.map(String), d.q_ret, d.horizons));
  charts.appendChild(qc);

  if (d.monthly) {
    const mc = document.createElement("div"); mc.className = "chart";
    mc.innerHTML = "<h3>monthly IC (blue) &amp; RankIC (red)</h3>";
    mc.appendChild(lineChart(d.monthly.labels, [d.monthly.ic, d.monthly.rank_ic], ["var(--pos)", "var(--neg)"]));
    charts.appendChild(mc);
  }
}

document.getElementById("filter").oninput = renderTable;
hSel.onchange = renderTable;
renderTable();
</script>
</body>
</html>
